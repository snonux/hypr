<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Hyperstack · Pi · FreeBSD Logo</title>
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <!-- Blue accent gradient for GPU/Hyperstack -->
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <!-- Pi symbol gradient (top blue to deeper blue) -->
    <linearGradient id="piGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <!-- Red accent for FreeBSD daemon horns -->
    <linearGradient id="bsdGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ff4444"/>
    </linearGradient>
    <!-- Glow filter for Pi symbol -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for BSD horns -->
    <filter id="hornGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="48" fill="url(#bg)"/>

  <!-- GPU circuit grid (Hyperstack A100 cloud) — raised opacity for small-size legibility -->
  <g opacity="0.20" stroke="#388bfd" stroke-width="1">
    <!-- Horizontal grid lines -->
    <line x1="40" y1="120" x2="472" y2="120"/>
    <line x1="40" y1="160" x2="472" y2="160"/>
    <line x1="40" y1="200" x2="472" y2="200"/>
    <line x1="40" y1="240" x2="472" y2="240"/>
    <line x1="40" y1="280" x2="472" y2="280"/>
    <line x1="40" y1="320" x2="472" y2="320"/>
    <line x1="40" y1="360" x2="472" y2="360"/>
    <line x1="40" y1="400" x2="472" y2="400"/>
    <!-- Vertical grid lines -->
    <line x1="80"  y1="100" x2="80"  y2="420"/>
    <line x1="120" y1="100" x2="120" y2="420"/>
    <line x1="160" y1="100" x2="160" y2="420"/>
    <line x1="200" y1="100" x2="200" y2="420"/>
    <line x1="240" y1="100" x2="240" y2="420"/>
    <line x1="280" y1="100" x2="280" y2="420"/>
    <line x1="320" y1="100" x2="320" y2="420"/>
    <line x1="360" y1="100" x2="360" y2="420"/>
    <line x1="400" y1="100" x2="400" y2="420"/>
    <line x1="440" y1="100" x2="440" y2="420"/>
  </g>

  <!-- Circuit nodes at intersections — raised opacity for readability at avatar size -->
  <g fill="#1f6feb" opacity="0.40">
    <circle cx="80"  cy="160" r="4"/>
    <circle cx="160" cy="120" r="4"/>
    <circle cx="240" cy="200" r="4"/>
    <circle cx="320" cy="160" r="4"/>
    <circle cx="400" cy="120" r="4"/>
    <circle cx="440" cy="200" r="4"/>
    <circle cx="120" cy="360" r="4"/>
    <circle cx="200" cy="400" r="4"/>
    <circle cx="280" cy="360" r="4"/>
    <circle cx="360" cy="400" r="4"/>
    <circle cx="440" cy="360" r="4"/>
    <circle cx="80"  cy="320" r="4"/>
  </g>

  <!-- PCB-style L-shaped traces — raised opacity for small-size legibility -->
  <g stroke="#1f6feb" stroke-width="2" fill="none" opacity="0.28">
    <polyline points="80,160 80,120 160,120"/>
    <polyline points="400,120 440,120 440,200"/>
    <polyline points="80,320 80,360 120,360"/>
    <polyline points="360,400 440,400 440,360"/>
    <polyline points="240,200 240,160 320,160"/>
  </g>

  <!--
    FreeBSD BSD daemon horns — bolded and widened so they read clearly
    at small (avatar) sizes. Both horns are symmetric bezier curves.
    The horns sit above the Pi crossbar and flare outward at the tips.
  -->
  <!-- Left horn: base at (206,172), tip curls left to (170,108) -->
  <path d="M 206 172
             C 204 155 198 138 188 122
             C 180 108 166 100 170 108
             C 174 116 180 130 182 146
             C 184 158 190 168 198 172 Z"
        fill="url(#bsdGrad)" filter="url(#hornGlow)"/>
  <!-- Left horn inner highlight -->
  <path d="M 204 168 C 200 150 192 132 184 118 C 178 108 172 104 174 112"
        stroke="#ffaaaa" stroke-width="2" fill="none" opacity="0.45"/>

  <!-- Right horn: base at (306,172), tip curls right to (342,108) — symmetric -->
  <path d="M 306 172
             C 308 155 314 138 324 122
             C 332 108 346 100 342 108
             C 338 116 332 130 330 146
             C 328 158 322 168 314 172 Z"
        fill="url(#bsdGrad)" filter="url(#hornGlow)"/>
  <!-- Right horn inner highlight -->
  <path d="M 308 168 C 312 150 320 132 328 118 C 334 108 340 104 338 112"
        stroke="#ffaaaa" stroke-width="2" fill="none" opacity="0.45"/>

  <!--
    π (Pi) symbol — centrepiece representing Pi.dev coding agent.
    Both legs use consistent cubic bezier strokes for visual symmetry.
    Crossbar: rounded rectangle across the top.
    Left leg: curves left-and-down, flaring at the foot.
    Right leg: mirrors the left leg, symmetric.
  -->
  <g filter="url(#glow)">
    <!-- Top crossbar -->
    <rect x="152" y="192" width="208" height="22" rx="11" fill="url(#piGrad)"/>

    <!-- Left leg — cubic bezier: starts below crossbar left side, sweeps down and curves at foot -->
    <path d="M 186 214
               C 186 270 178 320 166 354
               C 160 372 158 384 164 392
               C 170 400 182 400 190 392
               C 196 385 198 370 200 354
               C 210 302 214 256 214 214 Z"
          fill="url(#piGrad)"/>

    <!-- Right leg — symmetric to left leg -->
    <path d="M 326 214
               C 326 270 334 320 346 354
               C 352 372 354 384 348 392
               C 342 400 330 400 322 392
               C 316 385 314 370 312 354
               C 302 302 298 256 298 214 Z"
          fill="url(#piGrad)"/>
  </g>

  <!-- Subtle glow ring behind π for depth -->
  <ellipse cx="256" cy="308" rx="128" ry="108" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.15"/>

  <!-- Bottom label — HYPERSTACK in readable grey -->
  <text x="256" y="458"
        text-anchor="middle"
        font-family="'SF Mono','Fira Code','Consolas',monospace"
        font-size="18" font-weight="600" letter-spacing="4"
        fill="#8b949e">HYPERSTACK</text>
  <!-- Subtitle — GPU · PI · FREEBSD, light enough to be legible at rendered size -->
  <text x="256" y="480"
        text-anchor="middle"
        font-family="'SF Mono','Fira Code','Consolas',monospace"
        font-size="11" font-weight="400" letter-spacing="2"
        fill="#6e7681">GPU · PI · FREEBSD</text>
</svg>
